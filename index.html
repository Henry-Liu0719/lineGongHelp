<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>小貢的自動化幫手</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", "Microsoft JhengHei", "微軟正黑體", Arial, sans-serif;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            min-height: 100vh;
            overflow-x: hidden;
            -webkit-overflow-scrolling: touch;
            padding: 20px;
        }

        .container {
            max-width: 600px;
            margin: 0 auto;
            padding: 20px 0;
        }

        .header {
            text-align: center;
            color: white;
            padding: 30px 20px;
            margin-bottom: 30px;
        }

        .header h1 {
            font-size: 32px;
            margin-bottom: 10px;
            text-shadow: 2px 2px 4px rgba(0,0,0,0.3);
        }

        .header p {
            font-size: 16px;
            opacity: 0.9;
        }

        .features-grid {
            display: grid;
            grid-template-columns: 1fr;
            gap: 20px;
            padding: 0 10px;
        }

        .feature-card {
            background: white;
            border-radius: 20px;
            padding: 25px;
            box-shadow: 0 10px 30px rgba(0,0,0,0.3);
            transition: transform 0.3s, box-shadow 0.3s;
            cursor: pointer;
            text-decoration: none;
            color: inherit;
            display: block;
        }

        .feature-card:hover {
            transform: translateY(-5px);
            box-shadow: 0 15px 40px rgba(0,0,0,0.4);
        }

        .feature-card:active {
            transform: translateY(-2px);
        }

        .feature-icon {
            font-size: 48px;
            margin-bottom: 15px;
            text-align: center;
        }

        .feature-title {
            font-size: 22px;
            color: #667eea;
            margin-bottom: 12px;
            text-align: center;
            font-weight: bold;
        }

        .feature-description {
            font-size: 15px;
            color: #666;
            line-height: 1.6;
            text-align: center;
        }

        .arrow {
            text-align: center;
            margin-top: 15px;
            font-size: 20px;
            color: #667eea;
        }

        @media (max-width: 480px) {
            .header h1 {
                font-size: 26px;
            }

            .header p {
                font-size: 14px;
            }

            .feature-card {
                padding: 20px;
            }

            .feature-icon {
                font-size: 40px;
            }

            .feature-title {
                font-size: 20px;
            }

            .feature-description {
                font-size: 14px;
            }
        }

        @media (min-width: 768px) {
            .features-grid {
                grid-template-columns: repeat(2, 1fr);
            }
        }
    </style>
</head>
<body>
    <div class="container">
        <div class="header">
            <h1>🤖 小貢的自動化幫手</h1>
            <p>讓生活更便利的 LINE 機器人服務</p>
        </div>

        <div class="features-grid">
            <a href="Bookkeeping/index.html" class="feature-card">
                <div class="feature-icon">💰</div>
                <div class="feature-title">小貢幫記帳</div>
                <div class="feature-description">
                    快速記帳、預算管理、Google 試算表整合<br>
                    用最少的時間紀錄每一筆支出
                </div>
                <div class="arrow">→</div>
            </a>

            <a href="CreditCardTracking/index.html" class="feature-card">
                <div class="feature-icon">💳</div>
                <div class="feature-title">信用卡分析機器人</div>
                <div class="feature-description">
                    自動解析信用卡帳單、整理消費明細<br>
                    LINE 推播摘要與 Google Sheets 記錄
                </div>
                <div class="arrow">→</div>
            </a>

            <a href="DailyCalendar/index.html" class="feature-card">
                <div class="feature-icon">📅</div>
                <div class="feature-title">每日行事曆管家</div>
                <div class="feature-description">
                    自動發送 Google Calendar 事件到 LINE<br>
                    每天早上收到今日行程提醒
                </div>
                <div class="arrow">→</div>
            </a>

            <a href="AnnualCanlendar/index.html" class="feature-card">
                <div class="feature-icon">🗓️</div>
                <div class="feature-title">年度行事曆管理</div>
                <div class="feature-description">
                    自動建立年度與每月重複事件<br>
                    從 Google Sheet 同步到 Google Calendar
                </div>
                <div class="arrow">→</div>
            </a>
        </div>
    </div>
</body>
</html>
